name: Restrict PRs to master

on:
  pull_request:
    branches:
      - master

jobs:
  check-source:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          echo "PR from: ${{ github.head_ref }}"
          if [[ "${{ github.head_ref }}" != "dev" ]]; then
            echo "Only PRs from 'dev' to 'master' are allowed."
            exit 1
          else
            echo "Valid PR (dev → master)"
          fi
